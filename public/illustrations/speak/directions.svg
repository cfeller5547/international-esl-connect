<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200" fill="none">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#7dd3fc"/><stop offset="0.6" stop-color="#bae6fd"/><stop offset="1" stop-color="#e0f2fe"/></linearGradient>
  </defs>
  <rect width="400" height="200" rx="16" fill="url(#sky)"/>
  <!-- Ground -->
  <rect x="0" y="140" width="400" height="60" rx="0" fill="#86efac" opacity="0.4"/>
