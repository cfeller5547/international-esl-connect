  <circle cx="200" cy="30" r="10" fill="#ef4444" opacity="0.8"/>
  <circle cx="200" cy="30" r="4" fill="#ffffff" opacity="0.8"/>
  <path d="M200 40 L200 50" stroke="#ef4444" stroke-width="2" opacity="0.6"/>
