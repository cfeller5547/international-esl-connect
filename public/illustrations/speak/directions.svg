  <rect x="196" y="95" width="4" height="15" rx="2" fill="#fbbf24" opacity="0.6"/>
  <rect x="196" y="118" width="4" height="15" rx="2" fill="#fbbf24" opacity="0.6"/>
  <rect x="196" y="141" width="4" height="15" rx="2" fill="#fbbf24" opacity="0.6"/>
  <!-- Building 1 (left, blue) -->
  <rect x="20" y="50" width="60" height="95" rx="4" fill="#3b82f6" opacity="0.7"/>
  <rect x="28" y="60" width="16" height="16" rx="2" fill="#bfdbfe"/>
  <rect x="50" y="60" width="16" height="16" rx="2" fill="#bfdbfe"/>
  <rect x="28" y="84" width="16" height="16" rx="2" fill="#bfdbfe"/>
  <rect x="50" y="84" width="16" height="16" rx="2" fill="#bfdbfe"/>
  <rect x="38" y="110" width="20" height="35" rx="2" fill="#1e40af" opacity="0.5"/>
  <!-- Building 2 (right, orange) -->
  <rect x="300" y="40" width="70" height="105" rx="4" fill="#f97316" opacity="0.6"/>
  <rect x="310" y="52" width="16" height="16" rx="2" fill="#fed7aa"/>
  <rect x="336" y="52" width="16" height="16" rx="2" fill="#fed7aa"/>
  <rect x="310" y="76" width="16" height="16" rx="2" fill="#fed7aa"/>
  <rect x="336" y="76" width="16" height="16" rx="2" fill="#fed7aa"/>
  <rect x="324" y="105" width="22" height="40" rx="2" fill="#c2410c" opacity="0.4"/>
  <!-- Sign post -->
  <rect x="268" y="65" width="4" height="80" rx="2" fill="#78716c"/>
  <rect x="254" y="58" width="55" height="22" rx="6" fill="#ffffff" stroke="#3b82f6" stroke-width="1.5"/>
  <rect x="262" y="66" width="30" height="4" rx="2" fill="#3b82f6" opacity="0.6"/>
