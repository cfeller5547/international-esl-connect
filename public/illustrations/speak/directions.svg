  <circle cx="140" cy="108" r="14" fill="#fde68a"/>
  <rect x="130" y="124" width="20" height="30" rx="5" fill="#14b8a6"/>
  <circle cx="136" cy="106" r="1.5" fill="#1c1917"/>
  <circle cx="144" cy="106" r="1.5" fill="#1c1917"/>
  <!-- Map in hand -->
  <rect x="148" y="118" width="16" height="12" rx="2" fill="#ffffff" stroke="#94a3b8" stroke-width="0.8"/>
  <rect x="150" y="121" width="5" height="2" rx="1" fill="#ef4444" opacity="0.5"/>
  <rect x="150" y="125" width="8" height="1" rx="0.5" fill="#64748b" opacity="0.3"/>
