  <ellipse cx="100" cy="22" rx="30" ry="14" fill="#ffffff" opacity="0.7"/>
  <ellipse cx="85" cy="24" rx="18" ry="10" fill="#ffffff" opacity="0.6"/>
  <ellipse cx="330" cy="18" rx="22" ry="10" fill="#ffffff" opacity="0.5"/>
